appId: ${APP_ID}
name: Provider - Profile editor
---
- launchApp:
    clearState: false
- assertVisible: "Consultas de hoje"
- tapOn:
    id: "provider-tab-profile"
- assertVisible: "Perfil"
- tapOn:
    id: "provider-profile-edit-button"
- assertVisible:
    id: "provider-profile-edit-screen"
- assertVisible: "Informações do perfil"
- assertNotVisible: "Adicionar procedimento"
- tapOn:
    id: "provider-profile-edit-back-button"
